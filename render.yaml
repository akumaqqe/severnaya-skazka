services:
  - type: web
    name: folk-school
    runtime: python
    buildCommand: pip install -r requirements.txt
    preDeployCommand: python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn folk_school.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: SECURE_HSTS_SECONDS
        value: "31536000"
      - key: SECURE_HSTS_INCLUDE_SUBDOMAINS
        value: "True"
      - key: SECURE_HSTS_PRELOAD
        value: "True"
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: DATABASE_URL
        fromDatabase:
          name: folk-school-db
          property: connectionString

databases:
  - name: folk-school-db
